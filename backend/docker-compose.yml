services:
  postgres:
    image: postgres:15-alpine
    container_name: dental-core-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-dental_core}
      POSTGRES_USER: ${DB_USERNAME:-dental_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dental_secure_password}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-dental_admin} -d ${DB_NAME:-dental_core}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: